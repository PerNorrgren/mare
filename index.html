<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Talk to Mare</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Georgia', serif;
    height: 100vh;
    overflow: hidden;
    background: #1a0f0a;
  }

  /* Full bedroom background */
  #scene {
    position: relative;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
  }

  #bedroom-bg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center bottom;
  }

  /* Soft overlay to deepen the scene slightly at bottom */
  #scene::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 35%;
    background: linear-gradient(to top, rgba(60,30,20,0.35), transparent);
    pointer-events: none;
  }

  /* Mare container — sits bottom centre */
  #mare-container {
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: min(380px, 65vw);
    display: flex;
    flex-direction: column;
    align-items: center;
    pointer-events: none;
  }

  #mare-image {
    width: 100%;
    height: auto;
    /* multiply blend removes the cream background, leaves just Mare */
    mix-blend-mode: multiply;
    filter: drop-shadow(0 8px 24px rgba(0,0,0,0.4));
    animation: mare-breathe 4s ease-in-out infinite;
    transition: filter 0.5s ease;
  }

  @keyframes mare-breathe {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-8px); }
  }

  #mare-image.talking {
    animation: mare-talk 0.35s ease-in-out infinite alternate;
    filter: drop-shadow(0 8px 24px rgba(0,0,0,0.4)) brightness(1.04);
  }

  @keyframes mare-talk {
    from { transform: translateY(0px); }
    to   { transform: translateY(-5px); }
  }

  #mare-image.listening {
    animation: mare-listen 2.5s ease-in-out infinite;
  }

  @keyframes mare-listen {
    0%, 100% { transform: translateY(0px) rotate(-1.5deg); }
    50%       { transform: translateY(-5px) rotate(1deg); }
  }

  #mare-image.happy {
    filter: drop-shadow(0 8px 24px rgba(0,0,0,0.4)) brightness(1.08) saturate(1.1);
  }

  #mare-image.worried {
    animation: mare-worried 3s ease-in-out infinite;
    filter: drop-shadow(0 8px 24px rgba(0,0,0,0.4)) brightness(0.95);
  }

  @keyframes mare-worried {
    0%, 100% { transform: translateY(0px); }
    50%       { transform: translateY(-3px); }
  }

  /* Speech bubble */
  #speech-bubble {
    position: absolute;
    bottom: calc(min(380px, 65vw) * 0.82);
    left: 50%;
    transform: translateX(-50%);
    width: min(360px, 86vw);
    background: rgba(255,252,248,0.97);
    border-radius: 18px;
    padding: 14px 18px;
    font-size: 15px;
    line-height: 1.6;
    color: #3a2a1a;
    box-shadow: 0 4px 30px rgba(0,0,0,0.25), 0 1px 0 rgba(255,255,255,0.8) inset;
    opacity: 0;
    transition: opacity 0.4s ease;
    pointer-events: none;
    text-align: center;
    border: 1px solid rgba(200,170,140,0.3);
  }

  #speech-bubble::after {
    content: '';
    position: absolute;
    bottom: -13px;
    left: 50%;
    transform: translateX(-50%);
    border: 13px solid transparent;
    border-top-color: rgba(255,252,248,0.97);
    border-bottom: 0;
    filter: drop-shadow(0 2px 2px rgba(0,0,0,0.1));
  }

  #speech-bubble.visible { opacity: 1; }

  /* What the child said */
  #transcript-area {
    position: absolute;
    top: 16px; left: 16px; right: 16px;
    background: rgba(0,0,0,0.25);
    backdrop-filter: blur(8px);
    border-radius: 12px;
    padding: 10px 14px;
    color: rgba(255,240,220,0.85);
    font-size: 13px;
    font-style: italic;
    min-height: 36px;
    text-align: center;
    opacity: 0;
    transition: opacity 0.3s ease;
    border: 1px solid rgba(255,200,150,0.15);
  }

  #transcript-area.visible { opacity: 1; }

  /* Status text */
  #status {
    position: absolute;
    bottom: 88px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,230,200,0.7);
    font-size: 12px;
    letter-spacing: 0.08em;
    text-align: center;
    pointer-events: none;
    white-space: nowrap;
    text-shadow: 0 1px 4px rgba(0,0,0,0.5);
  }

  /* Mic button */
  #controls {
    position: absolute;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
  }

  #mic-btn {
    width: 62px; height: 62px;
    border-radius: 50%;
    border: 2px solid rgba(255,200,150,0.4);
    background: rgba(60,30,15,0.6);
    backdrop-filter: blur(12px);
    color: rgba(255,230,200,0.9);
    font-size: 24px;
    cursor: pointer;
    transition: all 0.2s ease;
    box-shadow: 0 2px 20px rgba(0,0,0,0.4), 0 0 0 0 rgba(220,120,80,0.4);
    display: flex; align-items: center; justify-content: center;
  }

  #mic-btn:hover {
    background: rgba(80,40,20,0.7);
    border-color: rgba(255,200,150,0.7);
    transform: scale(1.05);
  }

  #mic-btn.listening {
    background: rgba(180,60,40,0.75);
    border-color: rgba(255,150,120,0.8);
    animation: pulse-mic 1.5s ease-in-out infinite;
  }

  @keyframes pulse-mic {
    0%, 100% { box-shadow: 0 2px 20px rgba(0,0,0,0.4), 0 0 0 0 rgba(220,80,60,0.5); }
    50%       { box-shadow: 0 2px 20px rgba(0,0,0,0.4), 0 0 0 14px rgba(220,80,60,0); }
  }

  #mic-btn.disabled {
    opacity: 0.35;
    cursor: not-allowed;
    transform: none;
  }

  /* Loading overlay */
  #loading {
    position: absolute;
    inset: 0;
    background: rgba(20,10,5,0.85);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 18px;
    color: rgba(255,230,200,0.9);
    font-size: 15px;
    z-index: 20;
    transition: opacity 0.6s ease;
  }

  #loading.hidden { opacity: 0; pointer-events: none; }

  .spinner {
    width: 38px; height: 38px;
    border: 3px solid rgba(255,200,150,0.2);
    border-top-color: rgba(255,180,120,0.9);
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* Fairy lights decoration overlay */
  #fairy-lights {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 120px;
    pointer-events: none;
    opacity: 0.4;
  }
</style>
</head>
<body>
<div id="scene">

  <!-- Bedroom background -->
  <img id="bedroom-bg" src="/images/Mare_Bedroom.png" alt="">

  <!-- Transcript of what child said -->
  <div id="transcript-area"></div>

  <!-- Mare's speech bubble -->
  <div id="speech-bubble"></div>

  <!-- Mare herself -->
  <div id="mare-container">
    <img id="mare-image" src="/images/Mare.png" alt="Mare">
  </div>

  <!-- Status text -->
  <div id="status">Tap the mic to talk to Mare</div>

  <!-- Controls -->
  <div id="controls">
    <button id="mic-btn" title="Tap to speak">🎤</button>
  </div>

  <!-- Loading screen -->
  <div id="loading">
    <div class="spinner"></div>
    <div>Getting Mare ready…</div>
  </div>

</div>

<script>
// ─── WebSocket connection ───────────────────────────────────────────────
const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
const ws = new WebSocket(`${protocol}//${location.host}`);

const mareImg      = document.getElementById('mare-image');
const bubble       = document.getElementById('speech-bubble');
const transcriptEl = document.getElementById('transcript-area');
const micBtn       = document.getElementById('mic-btn');
const statusEl     = document.getElementById('status');
const loadingEl    = document.getElementById('loading');

let isListening   = false;
let isMareSpeak   = false;
let mediaRecorder = null;
let stream        = null;
let audioContext  = null;
let audioQueue    = [];
let isPlayingAudio = false;
let bubbleTimeout = null;

// ─── Mare state / animation ─────────────────────────────────────────────
function setMareState(state) {
  mareImg.className = state;
}

function showBubble(text) {
  if (bubbleTimeout) clearTimeout(bubbleTimeout);
  bubble.textContent = text;
  bubble.classList.add('visible');
}

function hideBubble(delay = 7000) {
  bubbleTimeout = setTimeout(() => bubble.classList.remove('visible'), delay);
}

function showTranscript(text) {
  transcriptEl.textContent = `"${text}"`;
  transcriptEl.classList.add('visible');
  setTimeout(() => transcriptEl.classList.remove('visible'), 4500);
}

// ─── Audio playback ─────────────────────────────────────────────────────
async function playAudioChunk(base64) {
  if (!audioContext) {
    audioContext = new (window.AudioContext || window.webkitAudioContext)();
  }
  const binary = atob(base64);
  const buf = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) buf[i] = binary.charCodeAt(i);
  audioQueue.push(buf.buffer);
  if (!isPlayingAudio) drainQueue();
}

async function drainQueue() {
  if (!audioQueue.length) { isPlayingAudio = false; return; }
  isPlayingAudio = true;
  const ab = audioQueue.shift();
  try {
    const decoded = await audioContext.decodeAudioData(ab);
    const src = audioContext.createBufferSource();
    src.buffer = decoded;
    src.connect(audioContext.destination);
    src.onended = drainQueue;
    src.start();
  } catch { drainQueue(); }
}

// ─── WebSocket messages ──────────────────────────────────────────────────
ws.onopen = () => console.log('Mare connected');

ws.onmessage = async (e) => {
  const msg = JSON.parse(e.data);

  switch (msg.type) {
    case 'ready':
      loadingEl.classList.add('hidden');
      statusEl.textContent = 'Tap the mic to talk to Mare';
      // Auto-trigger Mare's opening line
      setTimeout(() => {
        ws.send(JSON.stringify({ type: 'user_text', text: '[START]' }));
      }, 600);
      break;

    case 'transcript':
      if (msg.final) {
        showTranscript(msg.text);
        stopListening();
      } else {
        transcriptEl.textContent = msg.text;
        transcriptEl.classList.add('visible');
      }
      break;

    case 'mare_thinking':
      setMareState('listening');
      statusEl.textContent = 'Mare is thinking…';
      micBtn.classList.add('disabled');
      break;

    case 'mare_response':
      showBubble(msg.text);
      setMareState(msg.state || 'talking');
      break;

    case 'mare_speaking_start':
      setMareState('talking');
      statusEl.textContent = '';
      audioQueue = [];
      isPlayingAudio = false;
      isMareSpeak = true;
      break;

    case 'audio_chunk':
      await playAudioChunk(msg.data);
      break;

    case 'mare_speaking_end':
      isMareSpeak = false;
      setMareState('idle');
      micBtn.classList.remove('disabled');
      statusEl.textContent = 'Your turn — tap the mic';
      hideBubble(8000);
      break;

    case 'listening_started':
      statusEl.textContent = 'Listening…';
      break;

    case 'error':
      statusEl.textContent = msg.message || 'Something went wrong';
      micBtn.classList.remove('disabled');
      isMareSpeak = false;
      setMareState('idle');
      break;
  }
};

ws.onerror = () => {
  statusEl.textContent = 'Connection problem — please refresh';
  loadingEl.classList.add('hidden');
};

// ─── Mic ────────────────────────────────────────────────────────────────
async function startListening() {
  if (isMareSpeak || isListening) return;
  if (micBtn.classList.contains('disabled')) return;

  try {
    stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    isListening = true;
    micBtn.classList.add('listening');
    micBtn.textContent = '⏹';
    bubble.classList.remove('visible');

    ws.send(JSON.stringify({ type: 'start_listening' }));

    mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm;codecs=opus' });
    mediaRecorder.ondataavailable = (e) => {
      if (e.data.size > 0 && ws.readyState === WebSocket.OPEN) {
        e.data.arrayBuffer().then(ab => ws.send(ab));
      }
    };
    mediaRecorder.start(100);
  } catch (err) {
    statusEl.textContent = 'Microphone access needed';
    console.error(err);
  }
}

function stopListening() {
  if (!isListening) return;
  isListening = false;
  micBtn.classList.remove('listening');
  micBtn.textContent = '🎤';
  if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
  ws.send(JSON.stringify({ type: 'stop_listening' }));
}

micBtn.addEventListener('click', () => {
  if (isListening) stopListening();
  else startListening();
});

// Prevent page zoom on double-tap (mobile)
document.addEventListener('dblclick', e => e.preventDefault());
</script>
</body>
</html>
