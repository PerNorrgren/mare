<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Praat met Mare</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; background: #1a0f0a; font-family: Georgia, serif; }

  #scene { position: fixed; inset: 0; }

  #bedroom-bg {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover; object-position: center bottom;
  }

  #scene::after {
    content: '';
    position: absolute; bottom: 0; left: 0; right: 0;
    height: 30%;
    background: linear-gradient(to top, rgba(50,25,10,0.3), transparent);
    pointer-events: none;
  }

  #mare-container {
    position: absolute; bottom: 0; left: 50%;
    transform: translateX(-50%);
    width: min(320px, 55vw);
    pointer-events: none;
  }

  #mare-image {
    width: 100%; height: auto;
    mix-blend-mode: multiply;
    filter: drop-shadow(0 8px 24px rgba(0,0,0,0.35));
    animation: breathe 4s ease-in-out infinite;
  }

  @keyframes breathe {
    0%, 100% { transform: translateY(0); }
    50%       { transform: translateY(-8px); }
  }

  #mare-image.talking { animation: talk 0.35s ease-in-out infinite alternate; }
  @keyframes talk {
    from { transform: translateY(0); }
    to   { transform: translateY(-5px); }
  }

  #speech-bubble {
    position: absolute;
    bottom: calc(min(320px, 55vw) * 0.9);
    left: 50%; transform: translateX(-50%);
    width: min(340px, 88vw);
    background: rgba(255,252,248,0.97);
    border-radius: 18px;
    padding: 14px 18px;
    font-size: 15px; line-height: 1.6; color: #3a2a1a;
    box-shadow: 0 4px 30px rgba(0,0,0,0.2);
    opacity: 0; transition: opacity 0.4s ease;
    pointer-events: none; text-align: center;
    border: 1px solid rgba(200,170,140,0.3);
  }
  #speech-bubble::after {
    content: '';
    position: absolute; bottom: -13px; left: 50%; transform: translateX(-50%);
    border: 13px solid transparent;
    border-top-color: rgba(255,252,248,0.97); border-bottom: 0;
  }
  #speech-bubble.visible { opacity: 1; }

  #interim-text {
    position: fixed; bottom: 24px; left: 0; right: 0;
    text-align: center; font-size: 13px;
    color: rgba(255,230,200,0.6); font-style: italic;
    padding: 0 24px; pointer-events: none;
    text-shadow: 0 1px 4px rgba(0,0,0,0.6);
  }

  #status-text {
    position: fixed; bottom: 8px; left: 50%; transform: translateX(-50%);
    font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase;
    color: rgba(255,200,150,0.4); pointer-events: none;
    text-shadow: 0 1px 4px rgba(0,0,0,0.6);
  }

  #start {
    position: fixed; inset: 0;
    background: rgba(15,8,3,0.88);
    display: flex; align-items: center; justify-content: center;
    z-index: 99;
  }
  #start-inner { text-align: center; max-width: 320px; padding: 32px; }
  #start-inner h1 {
    font-size: 48px; color: rgba(255,230,200,0.9);
    margin-bottom: 12px; font-style: italic;
  }
  #start-inner p {
    font-size: 15px; line-height: 1.8;
    color: rgba(255,200,160,0.6); margin-bottom: 36px;
  }
  #start-btn {
    background: transparent;
    border: 1px solid rgba(255,180,120,0.5);
    color: rgba(255,200,150,0.8);
    padding: 14px 36px; border-radius: 6px;
    font-family: inherit; font-size: 13px;
    letter-spacing: 0.1em; text-transform: uppercase;
    cursor: pointer;
  }
  #start-btn:hover { border-color: rgba(255,180,120,0.9); color: rgba(255,220,180,1); }
</style>
</head>
<body>

<div id="start">
  <div id="start-inner">
    <h1>Mare</h1>
    <p>Tik om met Mare te praten.<br>Ze wacht op je.</p>
    <button id="start-btn" onclick="begin()">Praat met Mare</button>
  </div>
</div>

<div id="scene">
  <img id="bedroom-bg" src="/Mare_Bedroom.png" alt="">
  <div id="speech-bubble"></div>
  <div id="mare-container">
    <img id="mare-image" src="/Mare.png" alt="Mare">
  </div>
</div>

<div id="interim-text"></div>
<div id="status-text">mare</div>

<script>
const sessionId = Math.random().toString(36).slice(2);
const mareImg   = document.getElementById('mare-image');
const bubble    = document.getElementById('speech-bubble');
const interimEl = document.getElementById('interim-text');
const statusEl  = document.getElementById('status-text');

let hist = [];
let busy = false;
let isSpeaking = false;
let currentAudio = null;
let mediaStream = null;
let audioContext = null;
let processor = null;
let deepgramWs = null;
let accumulated = '';
let micActive = false;
let bubbleTimer = null;

const wsProtocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
const WS_URL = `${wsProtocol}//${location.host}/listen`;

function setStatus(t) { statusEl.textContent = t; }
function setMareState(s) { mareImg.className = s || ''; }

function showBubble(text) {
  clearTimeout(bubbleTimer);
  bubble.textContent = text;
  bubble.classList.add('visible');
}

function hideBubble(ms = 9000) {
  bubbleTimer = setTimeout(() => bubble.classList.remove('visible'), ms);
}

async function startListening() {
  if (micActive) return;
  try {
    mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
    audioContext = new AudioContext({ sampleRate: 16000 });
    const source = audioContext.createMediaStreamSource(mediaStream);

    deepgramWs = new WebSocket(WS_URL);

    deepgramWs.onopen = () => {
      micActive = true;
      setStatus('luistert...');

      processor = audioContext.createScriptProcessor(4096, 1, 1);
      source.connect(processor);
      processor.connect(audioContext.destination);

      processor.onaudioprocess = (e) => {
        if (isSpeaking || !deepgramWs || deepgramWs.readyState !== WebSocket.OPEN) return;
        const input = e.inputBuffer.getChannelData(0);
        const pcm16 = new Int16Array(input.length);
        for (let i = 0; i < input.length; i++) {
          pcm16[i] = Math.max(-32768, Math.min(32767, input[i] * 32768));
        }
        deepgramWs.send(pcm16.buffer);
      };
    };

    deepgramWs.onmessage = (event) => {
      if (isSpeaking || busy) return;
      try {
        const data = JSON.parse(event.data);
        const txt = data?.channel?.alternatives?.[0]?.transcript?.trim();

        if (data.is_final && txt) {
          accumulated = (accumulated + ' ' + txt).trim();
          interimEl.textContent = accumulated;
        } else if (!data.is_final && txt) {
          interimEl.textContent = (accumulated + ' ' + txt).trim();
        }

        if (data.speech_final && accumulated) {
          const t = accumulated;
          accumulated = '';
          interimEl.textContent = '';
          sendToMare(t);
        }

        if (data.type === 'UtteranceEnd' && accumulated) {
          const t = accumulated;
          accumulated = '';
          interimEl.textContent = '';
          sendToMare(t);
        }
      } catch(e) {}
    };

    deepgramWs.onerror = () => { micActive = false; setTimeout(startListening, 2000); };
    deepgramWs.onclose = () => { micActive = false; if (!isSpeaking) setTimeout(startListening, 1000); };

  } catch(e) {
    setStatus('microfoon niet beschikbaar');
  }
}

async function speak(text) {
  return new Promise(async (resolve) => {
    try {
      isSpeaking = true;
      setStatus('mare praat...');
      setMareState('talking');
      accumulated = '';
      interimEl.textContent = '';

      const r = await fetch('/api/speak', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text })
      });

      if (!r.ok) throw new Error('speak failed');

      const buffer = await r.arrayBuffer();
      const blob = new Blob([buffer], { type: 'audio/mpeg' });
      const url = URL.createObjectURL(blob);

      if (currentAudio) { currentAudio.pause(); currentAudio = null; }
      currentAudio = new Audio(url);

      currentAudio.onended = () => {
        URL.revokeObjectURL(url);
        isSpeaking = false;
        currentAudio = null;
        setMareState('');
        setTimeout(() => {
          setStatus('luistert...');
          if (!micActive) startListening();
        }, 600);
        hideBubble();
        resolve();
      };

      currentAudio.onerror = () => { isSpeaking = false; resolve(); };
      await currentAudio.play();

    } catch(e) {
      isSpeaking = false;
      setMareState('');
      setStatus('luistert...');
      resolve();
    }
  });
}

async function sendToMare(userMsg) {
  if (busy) return;
  busy = true;
  setStatus('mare denkt...');

  const message = (userMsg && userMsg !== '[START]') ? userMsg : 'begin';

  try {
    const r = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message, sessionId })
    });

    const data = await r.json();
    const reply = data.content?.[0]?.text || '';

    if (reply) {
      showBubble(reply);
      busy = false;
      await speak(reply);
    } else {
      busy = false;
      setStatus('luistert...');
    }
  } catch(e) {
    busy = false;
    setStatus('luistert...');
  }
}

async function begin() {
  document.getElementById('start').style.display = 'none';
  setStatus('verbinden...');
  await startListening();
  await sendToMare('[START]');
}
</script>
</body>
</html>
